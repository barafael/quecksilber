name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libxkbcommon-x11-0 libvulkan1 mesa-vulkan-drivers libgl1-mesa-dri

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - name: Install trunk
        run: cargo install trunk --locked

      - name: Build WASM demo
        working-directory: quecksilber-demo
        run: trunk build --release --dist ../_site --public-url /quecksilber/

      - name: Build screenshot tool
        run: cargo build --release -p quecksilber-screenshot

      - name: Capture screenshots
        run: xvfb-run --auto-servernum cargo run --release -p quecksilber-screenshot

      - name: Build screenshot gallery
        run: |
          mkdir -p _site/screenshots
          cp screenshots/*.png _site/screenshots/
          cd _site/screenshots
          imgs=""
          for f in *.png; do
            name="${f%.png}"
            imgs="$imgs<figure><img src=\"$f\" alt=\"$name\"><figcaption>$name</figcaption></figure>"
          done
          cat > index.html << HTMLEOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Quecksilber - Widget Gallery</title>
            <style>
              body { margin: 2rem; background: #f5f5f5; font-family: sans-serif; }
              h1 { text-align: center; }
              .grid { display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; }
              figure { margin: 0; text-align: center; }
              img { width: 200px; height: 200px; object-fit: contain; box-shadow: 0 2px 8px rgba(0,0,0,0.15); background: white; }
              figcaption { font-size: 0.85rem; color: #555; margin-top: 0.3rem; }
            </style>
          </head>
          <body>
            <h1>Quecksilber Widget Gallery</h1>
            <div class="grid">$imgs</div>
          </body>
          </html>
          HTMLEOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
